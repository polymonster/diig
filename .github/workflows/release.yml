name: release
on:
  push:
    tags:
    - '*'
jobs:
  setup:
    name: create release
    runs-on: ubuntu-latest
    steps:
      - name: create_release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          draft: false
          prerelease: false
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
  release_tesflight:
    needs: setup
    runs-on: [self-hosted, macOS]
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        token: ${{ secrets.DIIG_REG_TOKEN }}
        clean: true
    - name: release_tesflight
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        API_KEY_H: ${{ secrets.API_KEY_H }}
        REFS_VERSION: ${{ github.ref }}
      run: |
        # select xcode 16 (self hosted)
        ls /Applications/
        sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

        # bump version in plist
        export VERSION=$(echo $REFS_VERSION| cut -d'/' -f 3)
        export VERSION=$(echo $VERSION| cut -d'.' -f 3)
        echo "Version: $VERSION"
        /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $VERSION" app/dist/ios/Info.plist

        # build and upload
        cd app
        pmtech/pmbuild ios
        pmtech/pmbuild ios -libs
        echo "$API_KEY_H" >> code/api_key.h
        xcodebuild archive -workspace build/ios/diig_ios.xcworkspace -configuration Release -scheme diig -archivePath build/ios/diig_ios -allowProvisioningUpdates CODE_SIGN_STYLE=Automatic DEVELOPMENT_TEAM=7C3Y39TX3G
        xcodebuild -exportArchive -archivePath build/ios/diig_ios.xcarchive -exportPath build/ios/export -exportOptionsPlist dist/ios/ExportOptions.plist -allowProvisioningUpdates
        xcrun altool --upload-app -f build/ios/export/diig.ipa -t ios -u ${{secrets.APP_EMAIL}} -p ${{secrets.APP_PASSWORD}}
  release_google_play:
    needs: setup
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        token: ${{ secrets.DIIG_REG_TOKEN }} 
    - name: setup_jdk
      uses: actions/setup-java@v1
      with:
        java-version: 21.0
    - name: setup_gradle
      uses: gradle/actions/setup-gradle@v3
      with:
          gradle-version: 8.14.3 
    - name: setup_env
      run: |
        echo $env:ANDROID_HOME
        echo $env:JAVA_HOME
        echo $env:PATH
        java -version
    - name: resolve_secrets
      run: |
        absPath=$(realpath app/dist/android/upload-keystore.jks)
        echo "ABS_KEYSTORE_PATH=$absPath" >> "$GITHUB_ENV"
        echo '${{secrets.ANDROID_API_KEY_H}}' >> app/code/api_key.h
    - name: bump_version
      env:
        REFS_VERSION: ${{github.ref}}
      run: |
        VERSION=$(echo "$REFS_VERSION" | cut -d'/' -f 3)
        VERSION=$(echo "$VERSION" | cut -d'.' -f 3)
        echo "Version code: $VERSION"
        sed -i "s/androidversioncode \"[0-9]*\"/androidversioncode \"$VERSION\"/g" app/premake5.lua
    - name: build
      run: |
        cd app
        pmtech/pmbuild android
        cd build/android
        gradle wrapper
        ./gradlew bundleRelease "-Pandroid.injected.signing.store.file=$ABS_KEYSTORE_PATH" "-Pandroid.injected.signing.store.password=${{secrets.GOOGLE_PLAY_SIGNING_KEYSTORE_PASSWORD}}" "-Pandroid.injected.signing.key.alias=upload-key" "-Pandroid.injected.signing.key.password=${{secrets.GOOGLE_PLAY_SIGNING_KEYSTORE_PASSWORD}}"
    - name: upload
      uses: r0adkll/upload-google-play@v1
      with:
        serviceAccountJsonPlainText: ${{secrets.SERVICE_ACCOUNT_JSON}}
        packageName: pmtech.diig
        releaseFiles: "app/build/android/diig/build/outputs/bundle/release/diig-release.aab"
        track: internal
        status: draft
